<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Vendas</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

<div class="container">

    <div class="topo">
        <img src="logo.png" class="logo">
        <h2>VENDAS</h2>

        <div class="pesquisa">
            <input type="text" placeholder="Pesquisar">
            <button>Buscar</button>
        </div>

        <p>Usuário: Jhonas Frances</p>
    </div>

    <div class="corpo">

        <div class="menu">
            <ul>
                <li>Painel</li>
                <li>Relatórios</li>
                <li>Produtos</li>
                <li>Calendário</li>
                <li>Tabelas</li>
            </ul>
        </div>

        <div class="conteudo">

            <div class="cards">
                <div class="card">Vendas</div>
                <div class="card">Clientes</div>
                <div class="card">Produtos</div>
                <div class="card">Receitas</div>
            </div>

            <h2>Pedidos</h2>

            <table class="tabela">
                <tr>
                    <th>Cliente</th>
                    <th>Produto</th>
                    <th>Valor</th>
                    <th>Status</th>
                </tr>

                <tr>
                    <td>Carlos</td>
                    <td>biscoito</td>
                    <td>R$ 10</td>
                    <td>pago</td>
                </tr>

                <tr>
                    <td>Pedro</td>
                    <td>carne</td>
                    <td>R$ 80</td>
                    <td>pago</td>
                </tr>

                <tr>
                    <td>Rafael</td>
                    <td>laranja</td>
                    <td>R$ 15</td>
                    <td>pago</td>
                </tr>

            </table>

        </div>

    </div>

</div>

</body>
</html>
